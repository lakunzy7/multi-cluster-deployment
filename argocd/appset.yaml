apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authenticwrite
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/lakunzy7/multi-cluster-deployment.git
          revision: HEAD
          directories:
          - path: env/*
      - list:
          elements:
          - clusterAlias: local
            clusterName: in-cluster
          - clusterAlias: gke
            clusterName: k8slab-second-cluster
  template:
    metadata:
      name: authenticwrite-{{path.basename}}-{{clusterAlias}}
      annotations:
        kargo.akuity.io/authorized-stage: authenticwrite:{{path.basename}}
    spec:
      destination:
        namespace: authenticwrite-{{path.basename}}
        name: "{{clusterName}}"
      project: authenticwrite
      source:
        path: charts/authenticwrite
        repoURL: https://github.com/lakunzy7/multi-cluster-deployment.git
        helm:
          valueFiles:
          - "/env/{{path.basename}}/values.yaml"
