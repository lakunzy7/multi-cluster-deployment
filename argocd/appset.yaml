apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authenticwrite
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/lakunzy7/multi-cluster-deployment.git
          revision: HEAD
          directories:
          - path: env/*
      - list:
          elements:
          - clusterAlias: cluster1
            clusterName: in-cluster
          - clusterAlias: cluster2
            clusterName: k8slab-second-cluster
  template:
    metadata:
      name: authenticwrite-{{.path.basename}}-{{.clusterAlias}}
      labels:
        stage: "{{.path.basename}}"
      annotations:
        kargo.akuity.io/authorized-stage: authenticwrite:{{.path.basename}}
    spec:
      destination:
        namespace: authenticwrite-{{.path.basename}}
        name: "{{.clusterName}}"
      project: authenticwrite
      source:
        path: charts/authenticwrite
        repoURL: https://github.com/lakunzy7/multi-cluster-deployment.git
        helm:
          valueFiles:
          - "/env/{{.path.basename}}/values.yaml"
  # dev auto-syncs on apply; staging/prod stay manual so only Kargo promotion
  # advances them (their values.yaml still hold placeholder tags until promoted).
  templatePatch: |
    {{- if eq .path.basename "dev" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
    {{- end }}
