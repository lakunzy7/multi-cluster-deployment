---
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: eshop
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: eshop
  namespace: eshop
spec:
  # Fully manual promotion across all stages.
  # The chain dev -> staging -> prod is enforced by the Stage `sources.stages`
  # field (staging can only consume freight from dev; prod from staging),
  # plus per-stage verification gates that require both regional Applications
  # to be Healthy before that stage is considered "ready" for the next.
  promotionPolicies:
    - stage: dev
      autoPromotionEnabled: false
    - stage: staging
      autoPromotionEnabled: false
    - stage: prod
      autoPromotionEnabled: false
