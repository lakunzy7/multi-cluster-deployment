# Service account on GKE that ArgoCD (running on Kind) uses to deploy workloads.
# Apply this to the GKE cluster:
#   kubectl --context gke_expandox-cloudehub_europe-west1-b_cloud-cluster \
#     apply -f eshop-config/argocd-clusters/gke-argocd-sa.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-manager
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-manager-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: argocd-manager
    namespace: kube-system
---
# Long-lived bearer token for the SA (k8s >= 1.24 doesn't auto-create one)
apiVersion: v1
kind: Secret
metadata:
  name: argocd-manager-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: argocd-manager
type: kubernetes.io/service-account-token
