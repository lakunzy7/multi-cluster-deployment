# Re-register the local "in-cluster" so it carries labels for the ApplicationSet
# cluster generator. ArgoCD treats the name `in-cluster` specially: when a Secret
# named in-cluster exists with the cluster-secret label, ArgoCD uses its labels
# but still routes to the local k8s API via the in-cluster ServiceAccount.
apiVersion: v1
kind: Secret
metadata:
  name: in-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    env: multi
    region: local
type: Opaque
stringData:
  name: in-cluster
  server: https://kubernetes.default.svc
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
