---
# eShop staging — ApplicationSet fanning out to every cluster labeled env=multi.
# Generates one Application per matching cluster: eshop-staging-<region>.
# Auto-sync, like dev.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: eshop-staging
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            env: multi
  template:
    metadata:
      name: 'eshop-staging-{{metadata.labels.region}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: eshop
      source:
        repoURL: https://github.com/lakunzy7/multi-cluster-deployment.git
        targetRevision: main
        path: eshop-config/overlays/staging
      destination:
        name: '{{name}}'
        namespace: eshop-staging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
