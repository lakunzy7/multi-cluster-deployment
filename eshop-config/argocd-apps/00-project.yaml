---
# AppProject scoping all eShop Applications.
# Allows the dev/staging/prod namespaces on BOTH registered clusters
# (in-cluster on Kind, gke-cloud-cluster on GKE).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: eshop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: eShop application across dev/staging/prod, fanned out to all regional clusters
  sourceRepos:
    - https://github.com/lakunzy7/multi-cluster-deployment.git
  destinations:
    - name: '*'
      namespace: eshop-dev
    - name: '*'
      namespace: eshop-staging
    - name: '*'
      namespace: eshop-prod
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: storage.k8s.io
      kind: StorageClass
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
