---
# Cloud SQL Proxy Service
apiVersion: v1
kind: Service
metadata:
  name: cloudsql-proxy
  namespace: eshop
  labels:
    app: cloudsql-proxy
spec:
  type: ClusterIP
  selector:
    app: cloudsql-proxy
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
---
# Cloud SQL Proxy Deployment for secure database access
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudsql-proxy
  namespace: eshop
  labels:
    app: cloudsql-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudsql-proxy
  template:
    metadata:
      labels:
        app: cloudsql-proxy
    spec:
      serviceAccountName: eshop
      containers:
      - name: cloud-sql-proxy
        image: gcr.io/cloudsql-docker/cloud-sql-proxy:2.0
        imagePullPolicy: IfNotPresent
        command:
        - "/cloud_sql_proxy"
        - "-ip_address_types=PRIVATE"
        - "-instances=PROJECT_ID:REGION:cloudopshub-postgres=tcp:0.0.0.0:5432"
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 2
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: sa-key
          mountPath: /secrets/
          readOnly: true
      volumes:
      - name: sa-key
        secret:
          secretName: cloudsql-sa-key
          defaultMode: 0400
---
# Secret for Cloud SQL Service Account Key (must be created separately)
apiVersion: v1
kind: Secret
metadata:
  name: cloudsql-sa-key
  namespace: eshop
type: Opaque
stringData:
  key.json: |
    {
      "type": "service_account",
      "project_id": "PROJECT_ID",
      "private_key_id": "KEY_ID",
      "private_key": "-----BEGIN PRIVATE KEY-----\nPRIVATE_KEY_DATA\n-----END PRIVATE KEY-----\n",
      "client_email": "cloudsql-access@PROJECT_ID.iam.gserviceaccount.com",
      "client_id": "CLIENT_ID",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/cloudsql-access%40PROJECT_ID.iam.gserviceaccount.com"
    }
