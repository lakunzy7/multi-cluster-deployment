---
# Secret for eShop database credentials
apiVersion: v1
kind: Secret
metadata:
  name: eshop-db-credentials
  namespace: eshop
type: Opaque
stringData:
  username: eshop_user
  password: "CHANGE_ME_IN_PRODUCTION"
  connection-string: "Server=cloudsql-proxy.eshop.svc.cluster.local;Port=5432;Database=eshop;User Id=eshop_user;Password=CHANGE_ME_IN_PRODUCTION;SSL Mode=Require;"
---
# Secret for eShop Redis credentials
apiVersion: v1
kind: Secret
metadata:
  name: eshop-redis-credentials
  namespace: eshop
type: Opaque
stringData:
  password: "CHANGE_ME_IN_PRODUCTION"
  connection-string: "redis-password:CHANGE_ME_IN_PRODUCTION@redis.eshop.svc.cluster.local:6379"
---
# Secret for eShop JWT signing key
apiVersion: v1
kind: Secret
metadata:
  name: eshop-jwt-key
  namespace: eshop
type: Opaque
stringData:
  jwt-signing-key: "CHANGE_ME_WITH_SECURE_KEY_AT_LEAST_32_BYTES"
  jwt-issuer: "https://eshop.example.com"
---
# Secret for eShop API keys and credentials
apiVersion: v1
kind: Secret
metadata:
  name: eshop-api-keys
  namespace: eshop
type: Opaque
stringData:
  stripe-key: "CHANGE_ME_WITH_STRIPE_API_KEY"
  stripe-secret: "CHANGE_ME_WITH_STRIPE_SECRET"
  payment-service-key: "CHANGE_ME_WITH_PAYMENT_SERVICE_KEY"
---
# Secret for container registry access
apiVersion: v1
kind: Secret
metadata:
  name: eshop-registry-credentials
  namespace: eshop
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: '{"docker.io":{"auth":"BASE64_ENCODED_CREDENTIALS"}}'
