apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eshop

commonLabels:
  app.kubernetes.io/part-of: cloudopshub
  app.kubernetes.io/managed-by: argocd

resources:
  - eshop-namespace.yml
  - eshop-config.yml
  - backend-deployment.yml
  - backend-service.yml
  - frontend-deployment.yml
  - frontend-service.yml
  - ingress.yml

images:
  - name: backend
    newTag: latest
  - name: frontend
    newTag: latest
