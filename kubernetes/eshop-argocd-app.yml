---
# ArgoCD Application for eShop
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eshop
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dotnet/eShop
    targetRevision: main
    path: kubernetes/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: eshop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health assessment rules
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
---
# AppProject for eShop allowing specific repositories
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: eshop
  namespace: argocd
spec:
  sourceRepos:
  - 'https://github.com/dotnet/eShop'
  destinations:
  - namespace: 'eshop'
    server: https://kubernetes.default.svc
  - namespace: 'eshop'
    server: 'https://*'
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceBlacklist:
  - group: ''
    kind: ResourceQuota
  - group: ''
    kind: NetworkPolicy
