apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authenticwrite


namePrefix: staging-

commonLabels:
  env: staging

replicas:
- count: 2
  name: backend
- count: 2
  name: frontend

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: staging.authenticwrite.local
    - op: replace
      path: /spec/tls/0/hosts/0
      value: staging.authenticwrite.local
    - op: replace
      path: /spec/tls/0/secretName
      value: staging-authenticwrite-tls
  target:
    kind: Ingress
    name: authenticwrite

images:
- name: backend
  newName: ghcr.io/lakunzy7/authenticwrite/backend
  newTag: manual123
- name: frontend
  newName: ghcr.io/lakunzy7/authenticwrite/frontend
  newTag: manual123
- name: ghcr.io/lakunzy7/authenticwrite/backend
  newTag: staging
- name: ghcr.io/lakunzy7/authenticwrite/frontend
  newTag: staging
resources:
- ../../base
