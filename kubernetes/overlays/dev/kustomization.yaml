apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authenticwrite

bases:
  - ../../base

namePrefix: dev-

commonLabels:
  env: dev

replicas:
  - name: backend
    count: 1
  - name: frontend
    count: 1

patches:
  - target:
      kind: Ingress
      name: authenticwrite
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.authenticwrite.local
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.authenticwrite.local
      - op: replace
        path: /spec/tls/0/secretName
        value: dev-authenticwrite-tls

images:
  - name: ghcr.io/lakunzy7/authenticwrite/backend
    newTag: dev  # will be overridden by Kargo
  - name: ghcr.io/lakunzy7/authenticwrite/frontend
    newTag: dev  # will be overridden by Kargo
