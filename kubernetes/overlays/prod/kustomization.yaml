apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authenticwrite


namePrefix: prod-

commonLabels:
  env: prod

replicas:
- count: 3
  name: backend
- count: 3
  name: frontend

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: authenticwrite.example.com
    - op: replace
      path: /spec/tls/0/hosts/0
      value: authenticwrite.example.com
    - op: replace
      path: /spec/tls/0/secretName
      value: prod-authenticwrite-tls
  target:
    kind: Ingress
    name: authenticwrite

images:
- name: backend
  newName: ghcr.io/lakunzy7/authenticwrite/backend
  newTag: 4ab776fc
- name: frontend
  newName: ghcr.io/lakunzy7/authenticwrite/frontend
  newTag: 4ab776fc
- name: ghcr.io/lakunzy7/authenticwrite/backend
  newTag: prod
- name: ghcr.io/lakunzy7/authenticwrite/frontend
  newTag: prod
resources:
- ../../base
