apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authenticwrite

bases:
  - ../../base

namePrefix: prod-

commonLabels:
  env: prod

replicas:
  - name: backend
    count: 3
  - name: frontend
    count: 3

patches:
  - target:
      kind: Ingress
      name: authenticwrite
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: authenticwrite.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: authenticwrite.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: prod-authenticwrite-tls

images:
  - name: ghcr.io/lakunzy7/authenticwrite/backend
    newTag: latest
  - name: ghcr.io/lakunzy7/authenticwrite/frontend
    newTag: latest
