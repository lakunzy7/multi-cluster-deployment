# Template for GHCR pull secret
# To generate the sealed secret:
# 1. Create a regular secret with your GHCR credentials:
#    kubectl create secret docker-registry ghcr-pull-secret \
#      --docker-server=ghcr.io \
#      --docker-username=<github-username> \
#      --docker-password=<github-pat> \
#      --docker-email=<email> \
#      -n authenticwrite \
#      --dry-run=client -o yaml > secret.yaml
#
# 2. Seal it (after installing sealed-secrets):
#    kubeseal -f secret.yaml -w sealed-secret.yaml
#
# 3. Commit sealed-secret.yaml to the repo and apply it

apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: authenticwrite
type: kubernetes.io/dockercfg
data:
  # Base64-encoded .dockercfg JSON — replace with actual credentials
  # Format: {"ghcr.io":{"username":"<user>","password":"<pat>","email":"<email>","auth":"<base64-user:pat>"}}
  .dockercfg: |
    eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoieW91cmFjY291bnQiLCJwYXNzd29yZCI6InlvdXJwYXQiLCJlbWFpbCI6ImVtYWlsQGV4YW1wbGUuY29tIn19
