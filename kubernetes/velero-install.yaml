# Velero backup controller installation
# Prerequisites: AWS S3 bucket or compatible storage
# Install Velero CLI: https://velero.io/docs/main/basic-install/
# Then: velero install --provider aws --bucket <bucket-name> --secret-file ./credentials-velero

apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    name: velero

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero
  namespace: velero

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
  - nonResourceURLs:
      - '/metrics'
      - '/metrics/prometheus'
    verbs:
      - 'get'

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero
subjects:
  - kind: ServiceAccount
    name: velero
    namespace: velero

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-config
  namespace: velero
data:
  backup-location.yaml: |
    apiVersion: velero.io/v1
    kind: BackupStorageLocation
    metadata:
      name: default
    spec:
      provider: aws
      bucket: <YOUR-BUCKET-NAME>
      config:
        region: us-east-1  # adjust as needed
        s3ForcePathStyle: "true"
  volume-snapshot-location.yaml: |
    apiVersion: velero.io/v1
    kind: VolumeSnapshotLocation
    metadata:
      name: default
    spec:
      provider: aws
      config:
        region: us-east-1  # adjust as needed
  schedule-daily.yaml: |
    apiVersion: velero.io/v1
    kind: Schedule
    metadata:
      name: daily-backup
    spec:
      schedule: "0 2 * * *"  # 2 AM UTC daily
      template:
        includedNamespaces:
          - 'authenticwrite'
          - 'argocd'
          - 'monitoring'
        storageLocation: default
        volumeSnapshotLocation: default
        ttl: 720h  # 30 days retention

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  namespace: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: velero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velero
    spec:
      serviceAccountName: velero
      containers:
        - name: velero
          image: velero/velero:v1.11.0
          command:
            - /velero
          args:
            - server
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /credentials/cloud
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /credentials/cloud
          volumeMounts:
            - name: plugins
              mountPath: /plugins
            - name: scratch
              mountPath: /scratch
            - name: credentials
              mountPath: /credentials
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: plugins
          emptyDir: {}
        - name: scratch
          emptyDir: {}
        - name: credentials
          secret:
            secretName: cloud-credentials
            optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: velero
  namespace: velero
spec:
  ports:
    - name: http
      port: 8085
  selector:
    app.kubernetes.io/name: velero
