---
# Secret for Cloud SQL database credentials
apiVersion: v1
kind: Secret
metadata:
  name: cloudsql-credentials
  namespace: dev
type: Opaque
stringData:
  username: admin
  password: <GENERATED_BY_TERRAFORM>
  host: <CLOUD_SQL_PRIVATE_IP>
  port: "5432"
  database: cloudopshub
