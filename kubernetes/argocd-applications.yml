---
# Application for development environment (local cluster)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-platform-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/cloudopshub/app-manifests
    targetRevision: develop
    path: kubernetes/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# Application for staging environment (local cluster)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-platform-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/cloudopshub/app-manifests
    targetRevision: main
    path: kubernetes/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# Application for production environment (cloud cluster)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-platform-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/cloudopshub/app-manifests
    targetRevision: main
    path: kubernetes/prod

  destination:
    server: https://<CLOUD-CLUSTER-API-ENDPOINT>
    namespace: production

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# Monitoring stack (Prometheus + Grafana)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 54.0.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: fast-ssd
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
        grafana:
          adminPassword: "changeme"
          persistence:
            enabled: true
            storageClassName: standard
            size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

---
# Logging stack (Loki)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.0
    helm:
      values: |
        loki:
          persistence:
            enabled: true
            storageClassName: standard
            size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
