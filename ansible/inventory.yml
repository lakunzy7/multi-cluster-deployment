all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
    kubernetes_version: "1.28"
    container_runtime: containerd

  children:
    local_cluster:
      children:
        control_plane:
          hosts:
            local-cp:
              ansible_host: "{{ control_plane_ip }}"
              node_role: control-plane
        workers:
          hosts:
            local-worker-1:
              ansible_host: "{{ worker_1_ip }}"
              node_role: worker
            local-worker-2:
              ansible_host: "{{ worker_2_ip }}"
              node_role: worker
            local-worker-3:
              ansible_host: "{{ worker_3_ip }}"
              node_role: worker
      vars:
        cluster_name: "local-cluster"

    cloud_cluster:
      children:
        eks_nodes:
          hosts:
            cloud-node-1:
              ansible_host: "{{ cloud_node_1_ip }}"
            cloud-node-2:
              ansible_host: "{{ cloud_node_2_ip }}"
            cloud-node-3:
              ansible_host: "{{ cloud_node_3_ip }}"
      vars:
        cluster_name: "cloud-cluster"
        cluster_type: eks
