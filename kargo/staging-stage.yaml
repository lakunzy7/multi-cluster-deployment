apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: authenticwrite
  annotations:
    kargo.akuity.io/color: lime
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: authenticwrite
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      vars:
      - name: targetBranch
        value: staging
      steps:
      - task:
          name: default-promote
        as: promote-to-staging
