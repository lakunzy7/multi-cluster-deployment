apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: default-promote
  namespace: authenticwrite
spec:
  vars:
  - name: repoURL
    value: https://github.com/lakunzy7/multi-cluster-deployment.git
  - name: sourceBranch
    value: main
  - name: backendImage
    value: ghcr.io/lakunzy7/authenticwrite/backend
  - name: frontendImage
    value: ghcr.io/lakunzy7/authenticwrite/frontend
  - name: targetBranch

  steps:

  - uses: git-clone
    as: clone
    config:
      repoURL: ${{ vars.repoURL }}
      checkout:
      - branch: ${{ vars.sourceBranch }}
        path: ./src
      - branch: env/${{ vars.targetBranch }}
        create: true
        path: ./dst

  - uses: git-clear
    as: clear
    config:
      path: ./dst

  - uses: kustomize-set-image
    as: update-images
    config:
      path: ./src/kubernetes/overlays/${{ vars.targetBranch }}
      images:
      - image: ${{ vars.backendImage }}
        tag: ${{ imageFrom(vars.backendImage).Tag }}
      - image: ${{ vars.frontendImage }}
        tag: ${{ imageFrom(vars.frontendImage).Tag }}

  - uses: kustomize-build
    as: build-manifests
    config:
      path: ./src/kubernetes/overlays/${{ vars.targetBranch }}
      outPath: ./dst/${{ vars.targetBranch }}.yaml

  - uses: git-commit
    as: commit
    config:
      path: ./dst
      messageFromSteps:
      - update-images
      - build-manifests

  - uses: git-push
    as: push
    config:
      path: ./dst
      targetBranch: env/${{ vars.targetBranch }}

  - uses: argocd-update
    as: sync-argocd
    config:
      apps:
      - name: ${{ vars.targetBranch }}-app
        namespace: argocd
        sources:
        - repoURL: ${{ vars.repoURL }}
          desiredRevision: ${{ task.outputs.commit.commit }}
