apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: authenticwrite
  annotations:
    kargo.akuity.io/color: purple
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: authenticwrite
    sources:
      stages:
      - staging
  promotionTemplate:
    spec:
      vars:
      - name: targetBranch
        value: prod
      steps:
      - task:
          name: default-promote
        as: promote-to-prod
