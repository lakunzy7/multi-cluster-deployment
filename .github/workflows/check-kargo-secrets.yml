name: Check Kargo Secrets & Status

on:
  workflow_dispatch:  # Manual trigger from Actions tab
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours

permissions:
  contents: read
  security-events: write

jobs:
  check-kargo-secrets:
    name: Verify Kargo Registry Access
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure kubeconfig from secret
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Check Kargo namespace secrets
        id: kargo-secrets
        run: |
          echo "=== Checking Kargo namespace for GHCR secrets ==="
          KARGO_SECRETS=$(kubectl get secret -n kargo -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i ghcr || echo "NO_GHCR_SECRET_FOUND")
          echo "kargo_secrets=${KARGO_SECRETS}" >> $GITHUB_OUTPUT

          if [ "$KARGO_SECRETS" = "NO_GHCR_SECRET_FOUND" ]; then
            echo "❌ No GHCR secret found in kargo namespace"
            echo "secret_status=missing" >> $GITHUB_OUTPUT
          else
            echo "✅ Found GHCR secret in kargo namespace:"
            echo "$KARGO_SECRETS"
            echo "secret_status=found" >> $GITHUB_OUTPUT
          fi

      - name: Check authenticwrite namespace secrets
        id: auth-secrets
        run: |
          echo "=== Checking authenticwrite namespace for GHCR secrets ==="
          AUTH_SECRETS=$(kubectl get secret -n authenticwrite -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -i ghcr || echo "NO_GHCR_SECRET_FOUND")
          echo "auth_secrets=${AUTH_SECRETS}" >> $GITHUB_OUTPUT

          if [ "$AUTH_SECRETS" = "NO_GHCR_SECRET_FOUND" ]; then
            echo "❌ No GHCR secret found in authenticwrite namespace"
            echo "secret_status=missing" >> $GITHUB_OUTPUT
          else
            echo "✅ Found GHCR secret in authenticwrite namespace:"
            echo "$AUTH_SECRETS"
            echo "secret_status=found" >> $GITHUB_OUTPUT
          fi

      - name: Check Warehouse status
        id: warehouse
        run: |
          echo "=== Checking Warehouse status ==="
          WAREHOUSE_STATUS=$(kubectl get warehouse -n authenticwrite authenticwrite -o jsonpath='{.status.lastObservedGeneration}' 2>/dev/null || echo "WAREHOUSE_NOT_FOUND")

          if [ "$WAREHOUSE_STATUS" = "WAREHOUSE_NOT_FOUND" ]; then
            echo "❌ Warehouse not found"
            echo "warehouse_status=not_found" >> $GITHUB_OUTPUT
          else
            echo "✅ Warehouse found"
            echo "warehouse_status=found" >> $GITHUB_OUTPUT
            kubectl get warehouse -n authenticwrite -o wide
          fi

      - name: Check detected images in Warehouse
        id: images
        run: |
          echo "=== Checking for detected images in Warehouse ==="
          IMAGES=$(kubectl get warehouse -n authenticwrite authenticwrite -o jsonpath='{range .status.latestImages[*]}{.name}{":"}{.tag}{"\n"}{end}' 2>/dev/null || echo "NO_IMAGES_DETECTED")

          if [ "$IMAGES" = "NO_IMAGES_DETECTED" ]; then
            echo "⚠️ No images detected yet in Warehouse"
            echo "images_status=no_images" >> $GITHUB_OUTPUT
          else
            echo "✅ Images detected in Warehouse:"
            echo "$IMAGES"
            echo "images_status=detected" >> $GITHUB_OUTPUT
          fi

      - name: Check Promotions
        id: promotions
        run: |
          echo "=== Checking Promotion status ==="
          PROMOTIONS=$(kubectl get promotions -n authenticwrite -o wide 2>/dev/null || echo "NO_PROMOTIONS")
          echo "$PROMOTIONS"

          if [ "$PROMOTIONS" = "NO_PROMOTIONS" ]; then
            echo "⚠️ No promotions found yet"
            echo "promotions_status=none" >> $GITHUB_OUTPUT
          else
            echo "promotions_status=found" >> $GITHUB_OUTPUT
          fi

      - name: Check Stages
        id: stages
        run: |
          echo "=== Checking Stage status ==="
          kubectl get stages -n authenticwrite -o wide

          # Check each stage
          for stage in dev staging prod; do
            STAGE_STATUS=$(kubectl get stage $stage -n authenticwrite -o jsonpath='{.status.phase}' 2>/dev/null || echo "NOT_FOUND")
            echo "Stage '$stage': $STAGE_STATUS"
          done

      - name: Generate Health Report
        run: |
          cat > kargo-health-report.txt <<EOF
          ════════════════════════════════════════════════
          KARGO HEALTH CHECK REPORT
          ════════════════════════════════════════════════

          Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          REGISTRY CREDENTIALS:
          ├─ Kargo namespace GHCR secret: ${{ steps.kargo-secrets.outputs.secret_status }}
          └─ Authenticwrite namespace GHCR secret: ${{ steps.auth-secrets.outputs.secret_status }}

          WAREHOUSE:
          ├─ Status: ${{ steps.warehouse.outputs.warehouse_status }}
          └─ Detected Images: ${{ steps.images.outputs.images_status }}

          DEPLOYMENT PIPELINE:
          ├─ Promotions: ${{ steps.promotions.outputs.promotions_status }}
          └─ Stages: dev, staging, prod

          ACTIONS:
          └─ If GHCR secrets are missing, run the setup commands from the workflow

          ════════════════════════════════════════════════
          EOF

          cat kargo-health-report.txt

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kargo-health-report
          path: kargo-health-report.txt
          retention-days: 30

      - name: Fail if critical issues found
        if: |
          steps.kargo-secrets.outputs.secret_status == 'missing' ||
          steps.warehouse.outputs.warehouse_status == 'not_found'
        run: |
          echo "❌ Critical Kargo configuration issues found!"
          echo "Please review and fix the following:"
          echo "1. Ensure GHCR secrets exist in both namespaces"
          echo "2. Ensure Warehouse is properly deployed"
          exit 1

      - name: Comment on workflow
        if: always()
        run: |
          echo "## ✅ Kargo Secrets Check Complete"
          echo ""
          echo "### Summary"
          echo "- **Kargo GHCR Secret**: ${{ steps.kargo-secrets.outputs.secret_status }}"
          echo "- **Authenticwrite GHCR Secret**: ${{ steps.auth-secrets.outputs.secret_status }}"
          echo "- **Warehouse Status**: ${{ steps.warehouse.outputs.warehouse_status }}"
          echo "- **Detected Images**: ${{ steps.images.outputs.images_status }}"
          echo "- **Promotions**: ${{ steps.promotions.outputs.promotions_status }}"
