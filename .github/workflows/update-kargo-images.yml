name: Update Kargo Images

on:
  repository_dispatch:
    types: [images-built]

permissions:
  contents: write
  packages: read

jobs:
  update-images:
    name: Update image tags in kustomization
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Extract image SHA
        id: extract
        run: |
          BACKEND="${{ github.event.client_payload.backend_image }}"
          FRONTEND="${{ github.event.client_payload.frontend_image }}"
          SHA="${{ github.event.client_payload.sha }}"

          echo "backend_image=${BACKEND}" >> $GITHUB_OUTPUT
          echo "frontend_image=${FRONTEND}" >> $GITHUB_OUTPUT
          echo "image_sha=${SHA:0:8}" >> $GITHUB_OUTPUT

          echo "=== Image Update Triggered ==="
          echo "Backend:  ${BACKEND}"
          echo "Frontend: ${FRONTEND}"
          echo "SHA:      ${SHA:0:8}"

      - name: Update overlays with new images
        run: |
          # Install kustomize
          curl -sLo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz && sudo install -m 0755 kustomize /usr/local/bin/

          # Update all overlays
          for overlay in dev staging prod; do
            echo "=== Updating $overlay overlay ==="
            cd kubernetes/overlays/$overlay
            kustomize edit set image \
              backend=${{ steps.extract.outputs.backend_image }} \
              frontend=${{ steps.extract.outputs.frontend_image }}
            echo "Updated $overlay kustomization.yaml"
            cd ../../..
          done

          # Verify changes
          echo ""
          echo "=== Verification ==="
          for overlay in dev staging prod; do
            echo "--- $overlay overlay ---"
            grep -A 5 "images:" kubernetes/overlays/$overlay/kustomization.yaml || echo "No images section"
          done

      - name: Create pull request for image update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(kargo): update images to ${{ steps.extract.outputs.image_sha }}"
          title: "chore(kargo): update images to ${{ steps.extract.outputs.image_sha }}"
          body: |
            ## Image Update

            **Backend:** `${{ steps.extract.outputs.backend_image }}`
            **Frontend:** `${{ steps.extract.outputs.frontend_image }}`
            **Commit:** `${{ steps.extract.outputs.image_sha }}`

            This PR updates the dev overlay with newly built and scanned images.

            Merge to trigger Kargo promotion flow:
            - dev (automatic)
            - staging (manual approval)
            - prod (manual approval)

            ---
            Generated by GitHub Actions
          branch: update-images-${{ steps.extract.outputs.image_sha }}
          delete-branch: true
          labels: |
            kargo
            automated

      - name: Post workflow summary
        if: always()
        run: |
          echo "### Image Build Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Images Built & Scanned**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ steps.extract.outputs.backend_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ steps.extract.outputs.frontend_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Review image security scans in [Code Scanning](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY
          echo "2. Merge the auto-generated PR to trigger Kargo" >> $GITHUB_STEP_SUMMARY
          echo "3. Approve staging and prod promotions in Kargo UI" >> $GITHUB_STEP_SUMMARY
