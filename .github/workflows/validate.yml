name: Validate manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default to read-only. Each job opts in to anything more.
permissions:
  contents: read

# Cancel an in-flight run on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Pin tool versions + checksums in one place. Bump intentionally, not implicitly.
env:
  KUSTOMIZE_VERSION: v5.4.3
  KUSTOMIZE_SHA256: 3777bf3ed1801a7cfd0ed18a4d4e96b1bf6a8c4a14d7f3d2efff44a91f9c4dd6
  KUBECONFORM_VERSION: v0.6.7
  KUBECONFORM_SHA256: 95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
  TERRAFORM_VERSION: 1.9.0
  K8S_VERSION: 1.31.0

jobs:
  kustomize:
    name: Kustomize build all overlays
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install kustomize (verified)
        run: |
          set -euo pipefail
          curl -sLo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          echo "${KUSTOMIZE_SHA256}  kustomize.tar.gz" | sha256sum -c -
          tar -xzf kustomize.tar.gz
          sudo install -m 0755 kustomize /usr/local/bin/kustomize

      - name: Build dev overlay
        run: kustomize build eshop-config/overlays/dev > /tmp/dev.yaml

      - name: Build staging overlay
        run: kustomize build eshop-config/overlays/staging > /tmp/staging.yaml

      - name: Build prod overlay
        run: kustomize build eshop-config/overlays/prod > /tmp/prod.yaml

      - name: Summarize generated resources
        run: |
          for env in dev staging prod; do
            count=$(grep -c '^kind:' "/tmp/$env.yaml" || true)
            echo "$env: $count resources"
          done

  kubeconform:
    name: Validate k8s schemas
    runs-on: ubuntu-latest
    needs: kustomize
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install kustomize + kubeconform (verified)
        run: |
          set -euo pipefail
          curl -sLo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          echo "${KUSTOMIZE_SHA256}  kustomize.tar.gz" | sha256sum -c -
          tar -xzf kustomize.tar.gz && sudo install -m 0755 kustomize /usr/local/bin/kustomize
          curl -sLo kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz && sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Validate all overlays against k8s schemas
        run: |
          set -euo pipefail
          for env in dev staging prod; do
            echo "=== validating $env ==="
            kustomize build eshop-config/overlays/$env \
              | kubeconform -strict -ignore-missing-schemas -kubernetes-version "${K8S_VERSION}" -summary
          done

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3.1.1
        with:
          file_or_dir: |
            eshop-config/
            kubernetes/
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: { check-keys: false }
              comments: { min-spaces-from-content: 1 }
              indentation:
                spaces: consistent
                indent-sequences: consistent
                check-multi-line-strings: false

  terraform-validate:
    name: Terraform validate + fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: terraform fmt check
        run: terraform -chdir=terraform fmt -check -diff
        continue-on-error: true

      - name: terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: terraform validate
        run: terraform -chdir=terraform validate

  kargo-render:
    name: Validate Kargo manifests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: yaml syntax check on Kargo files
        run: |
          set -euo pipefail
          for f in eshop-config/kargo/*.yaml; do
            python3 -c "import yaml,sys; list(yaml.safe_load_all(open('$f')))" \
              && echo "ok: $f"
          done

  # ────────────── security jobs ──────────────

  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0       # full history so gitleaks scans every commit
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.6
        env:
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  trivy-config:
    name: IaC scan (trivy config)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write   # to upload SARIF to GitHub code-scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Trivy config scan (k8s + terraform + dockerfiles)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'          # report only; don't fail PRs on findings
          skip-dirs: eShop,.kargo-secrets,terraform/.terraform

      - name: Upload SARIF to GitHub code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8c78abb9b62512e3c45dea6559ffd924ed8549c8  # v3.28.0
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  checkov:
    name: Terraform compliance (checkov)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run checkov against terraform/
        uses: bridgecrewio/checkov-action@4209007fd2e1fce5cfecf9a36b7df0c635a3d76e  # v12.3030.0
        with:
          directory: terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true        # report only; tighten later
          skip_check: CKV_GCP_18,CKV_GCP_24,CKV_GCP_25  # accept lab-mode network policy posture

      - name: Upload SARIF to GitHub code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8c78abb9b62512e3c45dea6559ffd924ed8549c8  # v3.28.0
        with:
          sarif_file: checkov.sarif
          category: checkov
