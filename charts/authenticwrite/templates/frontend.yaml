apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: authenticwrite-{{ .Values.environment | default "dev" }}
  labels:
    app: authenticwrite
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: authenticwrite
      component: frontend
  template:
    metadata:
      labels:
        app: authenticwrite
        component: frontend
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}:{{ .Values.frontend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: authenticwrite-{{ .Values.environment | default "dev" }}
  labels:
    app: authenticwrite
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: authenticwrite
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
