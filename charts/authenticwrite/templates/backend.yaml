apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: authenticwrite-{{ .Values.environment | default "dev" }}
  labels:
    app: authenticwrite
    component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: authenticwrite
      component: backend
  template:
    metadata:
      labels:
        app: authenticwrite
        component: backend
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: authenticwrite-{{ .Values.environment | default "dev" }}
  labels:
    app: authenticwrite
    component: backend
spec:
  type: ClusterIP
  selector:
    app: authenticwrite
    component: backend
  ports:
    - port: 5000
      targetPort: 5000
      name: http
