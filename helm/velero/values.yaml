# Velero Helm Chart Values - Backup & Disaster Recovery
# Latest Version: v1.13.2 (2024-12)
# Helm Chart: 8.3.x
# Install: helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts
#          helm install velero vmware-tanzu/velero -f helm/velero/values.yaml -n velero --create-namespace

# Image
image:
  repository: velero/velero
  tag: v1.13.2
  pullPolicy: IfNotPresent

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Service Account
serviceAccount:
  create: true
  name: velero

# RBAC
rbac:
  create: true

# Configuration
configuration:
  # Storage location (where backups are stored)
  backupStorageLocation:
    name: default
    # Options: aws, azure, gcp, s3, cinder, etc.
    provider: aws
    bucket: my-velero-backups  # Change to your bucket name
    config:
      region: us-east-1  # Change to your region
      s3Url: http://s3.us-east-1.amazonaws.com  # For AWS
      # For local MinIO:
      # s3Url: http://minio:9000
      # insecureSkipTLSVerify: "true"

  # Volume snapshot location
  volumeSnapshotLocation:
    name: default
    provider: aws  # Change based on your provider
    config:
      region: us-east-1  # Change to your region

  # Backup schedule defaults
  backupDefaults:
    ttl: "720h"  # 30 days

# Credentials (if using AWS, Azure, GCP, etc.)
# Create secret: kubectl create secret generic velero-credentials -n velero --from-file=cloud=./credentials-velero
credentials:
  useSecret: false  # Set to true if using cloud provider credentials
  name: velero-credentials
  # extraSecret: false

# Schedules - Automated backups
schedules:
  # Daily backup at 2 AM
  daily-backup:
    schedule: "0 2 * * *"
    template:
      ttl: "720h"
      storageLocation: default
      includedNamespaces:
      - '*'
      excludedNamespaces:
      - kube-system
      - kube-node-lease
      - kube-public
      - kube-apiserver

# Pre and post backup hooks
backupHooks: []
# Example:
# - name: backup-hook
#   namespaces:
#   - default
#   containers:
#   - name: hook
#     image: myimage:latest
#     command: ["/bin/sh", "-c", "backup-script"]

# Restore hooks
restoreHooks: []

# Persistence for Velero logs
persistence:
  enabled: false
  # storageClass: standard
  # accessMode: ReadWriteOnce
  # size: 10Gi

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # Enable if Prometheus is installed

# Logging
logLevel: info
logFormat: text
