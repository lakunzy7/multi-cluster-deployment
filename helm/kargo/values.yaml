# Kargo Helm Chart Values - Simplified
# Latest Version: v1.10.5 (2024-12)
# Helm Chart: 1.10.x
# Install: helm repo add kargo https://charts.kargo.io
#          helm install kargo kargo/kargo -f helm/kargo/values.yaml -n kargo --create-namespace

# Image Configuration
image:
  repository: ghcr.io/akuity/kargo
  tag: v1.10.5  # Latest stable version
  pullPolicy: IfNotPresent

# Global Settings
global:
  systemResources:
    namespace: kargo-system-resources
    createNamespace: true
  sharedResources:
    namespace: kargo-shared-resources
    createNamespace: true

# CRDs and RBAC
crds:
  install: true
  keep: true

rbac:
  installClusterRoles: true
  installClusterRoleBindings: true

# Webhooks
webhooks:
  register: true

# API Server
api:
  enabled: true
  replicas: 1
  host: localhost
  logLevel: INFO
  logFormat: CONSOLE
  secretManagementEnabled: true
  adminAccount:
    enabled: true
    # IMPORTANT: Change this password hash!
    # Generate with: htpasswd -c auth admin
    # Then: bcrypt hash the password
    passwordHash: "$2y$05$YUs76C7RV70Hbcc4XkzQ3uBcOe3/IVUXFjHYpS/jmnkrmyO4WfPgu"
    tokenSigningKey: "bXk4dGhpczFzQHNlY3VyZXI0bmRvbXM3"
    tokenTTL: 24h
  service:
    type: ClusterIP

# Controller
controller:
  enabled: true
  logLevel: INFO
  logFormat: CONSOLE
  isDefault: false
  reconcilers:
    maxConcurrentReconciles: 4
  gitClient:
    name: "Kargo"
    email: "no-reply@kargo.io"
    pushIntegrationPolicy: "AlwaysRebase"

# Garbage Collector
garbageCollector:
  enabled: true
  schedule: "0 * * * *"
  workers: 3
  maxRetainedPromotions: 20
  minPromotionDeletionAge: 336h

# External Webhooks Server
externalWebhooksServer:
  enabled: true
  replicas: 1
  host: localhost
  logLevel: INFO
  logFormat: CONSOLE

# Management Controller
managementController:
  enabled: true
  logLevel: INFO
  logFormat: CONSOLE

# Webhooks Server
webhooksServer:
  enabled: true
  replicas: 1
  logLevel: INFO
  logFormat: CONSOLE
