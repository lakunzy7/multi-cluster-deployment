# Prometheus (kube-prometheus-stack) Helm Chart Values
# Latest Version: Chart 86.1.1 | Prometheus v0.91.0 (2024-12)
# Install: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#          helm install prometheus prometheus-community/kube-prometheus-stack -f helm/prometheus/values.yaml -n monitoring --create-namespace

# Global settings
global:
  rbac:
    create: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  namespaces:
    releaseNamespace: true
    additional: []

# Prometheus
prometheus:
  enabled: true
  replicas: 1

  # Prometheus configuration
  prometheusSpec:
    replicas: 1
    retention: 15d
    retentionSize: "1GB"

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Scrape interval
    scrapeInterval: 30s
    scrapeTimeout: 10s

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Grafana
grafana:
  enabled: true
  replicas: 1

  # Admin credentials
  adminPassword: "prom-operator"  # Change this!

  # Datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-operated:9090
        isDefault: true

  # Dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# AlertManager
alertmanager:
  enabled: true
  replicas: 1

# Node Exporter
nodeExporter:
  enabled: true

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Prometheus Node Exporter (additional)
prometheus-node-exporter:
  enabled: true
