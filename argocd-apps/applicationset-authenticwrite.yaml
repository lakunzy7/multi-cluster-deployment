apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authenticwrite
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # Generate one entry per environment
          - list:
              elements:
                - env: dev
                  path: overlays/dev
                - env: staging
                  path: overlays/staging
                - env: prod
                  path: overlays/prod
          # Cross-product with explicit clusters
          - list:
              elements:
                - cluster: cloudopshub-local
                  server: https://kubernetes.default.svc
                - cluster: cloud-cluster
                  server: https://34.156.236.159

  template:
    metadata:
      name: '{{env}}-{{cluster}}'
      labels:
        app: authenticwrite
        env: '{{env}}'
        cluster: '{{cluster}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/lakunzy7/multi-cluster-deployment.git
        targetRevision: main
        path: 'kubernetes/{{path}}'
      destination:
        server: '{{server}}'
        namespace: 'authenticwrite-{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
